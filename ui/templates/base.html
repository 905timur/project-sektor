<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Imbalance Bot{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: {
                            50: '#f7f7f8',
                            100: '#e4e4e7',
                            200: '#d4d4d8',
                            300: '#a1a1aa',
                            400: '#71717a',
                            500: '#52525b',
                            600: '#3f3f46',
                            700: '#27272a',
                            800: '#18181b',
                            900: '#09090b',
                            950: '#030305',
                        }
                    }
                }
            }
        }
    </script>
    
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-dark-900 text-dark-100 min-h-screen" x-data="{ 
    sidebarOpen: false,
    paperTrading: {{ 'true' if paper_trading else 'false' }}
}">
    <!-- Top Navigation -->
    <nav class="bg-dark-800 border-b border-dark-700 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Logo -->
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-emerald-600 rounded-lg flex items-center justify-center">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path>
                        </svg>
                    </div>
                    <span class="text-xl font-bold text-white">Imbalance Bot</span>
                    
                    <!-- Paper Trading Badge -->
                    <template x-if="paperTrading">
                        <span class="bg-amber-600/20 text-amber-400 px-2 py-0.5 text-xs font-medium rounded border border-amber-600/30">
                            PAPER TRADING
                        </span>
                    </template>
                </div>
                
                <!-- Nav Links -->
                <div class="flex items-center gap-4">
                    <a href="/" 
                       class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                              {% if request.url.path == '/' %}bg-dark-700 text-white{% else %}text-dark-300 hover:text-white hover:bg-dark-700{% endif %}">
                        Dashboard
                    </a>
                    <a href="/settings" 
                       class="px-3 py-2 rounded-md text-sm font-medium transition-colors
                              {% if request.url.path == '/settings' %}bg-dark-700 text-white{% else %}text-dark-300 hover:text-white hover:bg-dark-700{% endif %}">
                        Settings
                    </a>
                </div>
            </div>
        </div>
    </nav>
    
    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        {% block content %}{% endblock %}
    </main>
    
    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50"></div>
    
    <!-- HTMX Events -->
    <script>
        document.addEventListener('htmx:configRequest', (event) => {
            // Add any headers for HTMX requests
        });
        
        document.addEventListener('settings-saved', (event) => {
            // Handle settings saved event
            console.log('Settings saved');
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
